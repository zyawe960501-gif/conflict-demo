<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>大學生存指南</title>
    <style>
        body {
            font-family: "Microsoft JhengHei", Arial, sans-serif;
            max-width: 500px;
            margin: 30px auto;
            padding: 20px;
            background-color: #fffde7;
            color: #333;
        }
        h1 {
            text-align: center;
            font-size: 1.6em;
        }
        .tip {
            background-color: #fff;
            border-radius: 12px;
            padding: 15px;
            margin: 15px 0;
            box-shadow: 0 2px 6px rgba(0,0,0,0.08);
        }
        .tip h3 {
            margin: 0 0 8px 0;
        }
        .tip p {
            margin: 0;
            color: #555;
            line-height: 1.6;
        }
        .footer {
            text-align: center;
            color: #aaa;
            margin-top: 30px;
            font-size: 0.85em;
        }
    </style>
</head>
<body>
    <h1>🎓 大學生存指南</h1>
    <p style="text-align:center; color:#888;">每個大學生都該知道的事</p>

    <div class="tip">
        <h3>☕ 提神秘技</h3>
        <p>早八的救星：學餐的美式咖啡，大杯只要 35 元。</p>
    </div>

    <div class="tip">
        <h3>🍜 覓食法則</h3>
        <p>午餐尖峰時段是 12:00～12:30，建議 11:40 先衝！</p>
    </div>

    <div class="tip">
        <h3>📖 期末生存術</h3>
        <p>圖書館 3 樓的靠窗位最搶手，期末週請提早 30 分鐘卡位。</p>
    </div>

    <div class="footer">
        <p>大學生存指南 v1.0 — 祝你順利畢業 🎉</p>
    </div>
</body>
</html>

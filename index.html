<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>大學生存指南</title>
    <style>
        body {
            font-family: "Microsoft JhengHei", Arial, sans-serif;
            max-width: 500px;
            margin: 30px auto;
            padding: 20px;
            background-color: #fff3e0;
            color: #333;
        }
        h1 {
            text-align: center;
            font-size: 1.6em;
        }
        .tip {
            background-color: #fff;
            border-radius: 12px;
            padding: 15px;
            margin: 15px 0;
            box-shadow: 0 2px 6px rgba(0,0,0,0.08);
        }
        .tip h3 {
            margin: 0 0 8px 0;
        }
        .tip p {
            margin: 0;
            color: #555;
            line-height: 1.6;
        }
        .footer {
            text-align: center;
            color: #aaa;
            margin-top: 30px;
            font-size: 0.85em;
        }
    </style>
</head>
<body>
    <h1>🎓 大學生存指南 — 吃貨篇</h1>
    <p style="text-align:center; color:#888;">民以食為天，大學生以吃為先</p>

    <div class="tip">
        <h3>☕ 提神秘技</h3>
        <p>早八的救星：校門口的「醒醒吧」拿鐵，第二杯半價超划算。</p>
    </div>

    <div class="tip">
        <h3>🍜 覓食法則</h3>
        <p>午餐別再去學餐擠了！走遠 5 分鐘的巷子裡有 60 元便當，CP 值超高。</p>
    </div>

    <div class="tip">
        <h3>📖 期末生存術</h3>
        <p>圖書館 3 樓的靠窗位最搶手，期末週請提早 30 分鐘卡位。</p>
    </div>

    <div class="tip">
        <h3>🧋 下午茶時光</h3>
        <p>每週三飲料店買一送一，記得揪團訂購，當全班的英雄。</p>
    </div>

    <div class="footer">
        <p>大學生存指南 v1.1 — 吃飽才有力氣讀書 🍱</p>
    </div>
</body>
</html>
